<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 丁惠!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ffd1ff 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Floating emojis */
        .emoji-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        
        .floating {
            position: absolute;
            font-size: 40px;
            animation: fall linear infinite;
            opacity: 0.8;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
        
        /* Main content */
        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
        }
        
        /* Card */
        .card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 25px;
        }
        
        h1 {
            font-size: 50px;
            color: #e91e63;
            margin-bottom: 15px;
        }
        
        .name {
            font-size: 70px;
            color: #e91e63;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.15);
        }
        
        .cake {
            font-size: 100px;
            margin: 15px 0;
            animation: bounce 1.5s infinite;
            cursor: pointer;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }
        
        .cake:hover {
            animation: shake 0.5s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        
        .message {
            font-size: 22px;
            color: #555;
            line-height: 1.7;
            margin: 20px 0;
        }
        
        .from {
            font-size: 26px;
            color: #e91e63;
            margin-top: 30px;
            font-weight: bold;
        }
        
        /* Balloons */
        .balloons {
            font-size: 60px;
            margin: 15px 0;
        }
        
        /* Click to blow candle */
        .candle-area {
            position: relative;
            display: inline-block;
        }
        
        .candle {
            font-size: 30px;
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            animation: flicker 0.3s infinite alternate;
        }
        
        @keyframes flicker {
            0% { opacity: 0.8; transform: translateX(-50%) scale(1); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }
        
        .flame {
            display: none;
        }
        
        .flame.on {
            display: block;
        }
        
        /* Wish button */
        .wish-btn {
            background: linear-gradient(135deg, #e91e63, #ff5722);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px;
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .wish-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(233, 30, 99, 0.5);
        }
        
        .wishes {
            display: none;
            margin-top: 20px;
        }
        
        .wishes.show {
            display: block;
            animation: popIn 0.5s;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .wish {
            font-size: 24px;
            color: #e91e63;
            margin: 10px 0;
            padding: 10px;
            background: #fff5f8;
            border-radius: 15px;
        }
        
        /* Photo gallery with fun frames */
        .photos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }
        
        .photo-frame {
            background: white;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .photo-frame:hover {
            transform: rotate(3deg) scale(1.05);
        }
        
        .photo-placeholder {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
        }
        
        .photo-label {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
        }
        
        /* Game section */
        .game-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            padding: 25px;
            margin: 15px 0;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .game-card:hover {
            transform: scale(1.02);
        }
        
        .game-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        /* Mini game */
        .game-area {
            display: none;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .game-area.show {
            display: block;
        }
        
        .game-area canvas {
            border-radius: 10px;
            max-width: 100%;
        }
        
        .close-game {
            background: #e91e63;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        footer {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Floating emojis -->
    <div class="emoji-bg" id="emojiBg"></div>
    
    <div class="container">
        <!-- Main birthday card -->
        <div class="card">
            <h1>🎉 Happy Birthday! 🎉</h1>
            <div class="name">丁惠</div>
            
            <div class="candle-area">
                <div class="cake" onclick="blowCandle()">🎂</div>
                <div class="candle" id="candle">
                    <span class="flame on" id="flame">🕯️</span>
                </div>
            </div>
            
            <p class="message">
                祝您生日快乐！<br>
                愿您每天都开心快乐！<br>
                愿您心想事成！健康幸福！
            </p>
            
            <button class="wish-btn" onclick="showWishes()">🎁 点击许愿</button>
            
            <div class="wishes" id="wishes">
                <div class="wish">💖 愿您永远年轻！</div>
                <div class="wish">💰 愿您财源滚滚！</div>
                <div class="wish">🏥 愿您身体健康！</div>
                <div class="wish">🎉 愿您天天开心！</div>
                <div class="wish">👨‍👩‍👦 愿我们一家幸福！</div>
            </div>
            
            <div class="balloons">🎈🎉🎈</div>
        </div>
        
        <!-- Photo section -->
        <div class="card">
            <h2>📸 美好回忆</h2>
            <div class="photos">
                <div class="photo-frame">
                    <div class="photo-placeholder">📷</div>
                    <div class="photo-label">点击添加</div>
                </div>
                <div class="photo-frame">
                    <div class="photo-placeholder">📷</div>
                    <div class="photo-label">点击添加</div>
                </div>
                <div class="photo-frame">
                    <div class="photo-placeholder">📷</div>
                    <div class="photo-label">点击添加</div>
                </div>
                <div class="photo-frame">
                    <div class="photo-placeholder">📷</div>
                    <div class="photo-label">点击添加</div>
                </div>
            </div>
        </div>
        
        <!-- Fun game -->
        <div class="card">
            <h2>🎮 来玩游戏吧!</h2>
            <div class="game-card" onclick="startGame()">
                <h3>🧁 戳蛋糕游戏</h3>
                <p>点击蛋糕得分!</p>
            </div>
            
            <div class="game-area" id="gameArea">
                <canvas id="gameCanvas" width="350" height="350"></canvas>
                <br>
                <button class="close-game" onclick="stopGame()">结束游戏</button>
            </div>
            
            <p>分数: <span id="score">0</span></p>
        </div>
        
        <!-- Message -->
        <div class="card">
            <p class="message">
                感谢您一直以来的爱和付出！<br>
                您是最棒的妈妈！
            </p>
            <p class="from">—— 爱您的 Chris ❤️</p>
        </div>
        
        <footer>
            <p>🎉 Made with ❤️ for Mom 🎉</p>
        </footer>
    </div>
    
    <script>
        // Floating emojis
        const emojis = ['❤️', '💕', '💖', '💗', '🎉', '🎈', '🌟', '⭐', '💫', '🎊'];
        const emojiBg = document.getElementById('emojiBg');
        
        for(let i = 0; i < 30; i++) {
            const emoji = document.createElement('div');
            emoji.className = 'floating';
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + '%';
            emoji.style.animationDuration = (Math.random() * 3 + 3) + 's';
            emoji.style.animationDelay = Math.random() * 5 + 's';
            emojiBg.appendChild(emoji);
        }
        
        // Blow candle
        let candleBlown = false;
        function blowCandle() {
            if(!candleBlown) {
                document.getElementById('flame').classList.remove('on');
                candleBlown = true;
                alert('🎉 许个愿吧！🎉');
            }
        }
        
        // Show wishes
        function showWishes() {
            document.getElementById('wishes').classList.add('show');
        }
        
        // Cake click game
        let gameRunning = false;
        let score = 0;
        let cake = {x: 175, y: 175};
        let clicks = [];
        
        function startGame() {
            document.getElementById('gameArea').classList.add('show');
            gameRunning = true;
            score = 0;
            document.getElementById('score').innerText = '0';
            gameLoop();
        }
        
        function stopGame() {
            gameRunning = false;
            document.getElementById('gameArea').classList.remove('show');
        }
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function gameLoop() {
            if(!gameRunning) return;
            
            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 350, 350);
            
            // Draw cake
            ctx.font = '50px Arial';
            ctx.fillText('🧁', cake.x - 25, cake.y + 20);
            
            // Draw clicks
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            clicks.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
                ctx.fill();
                c.size -= 1;
            });
            clicks = clicks.filter(c => c.size > 0);
            
            requestAnimationFrame(gameLoop);
        }
        
        canvas.addEventListener('click', function(e) {
            if(!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Check if clicked on cake
            let dx = x - cake.x;
            let dy = y - cake.y;
            if(Math.sqrt(dx*dx + dy*dy) < 40) {
                score += 10;
                document.getElementById('score').innerText = score;
                cake.x = Math.random() * 300 + 25;
                cake.y = Math.random() * 300 + 25;
            }
            
            // Click effect
            clicks.push({x: x, y: y, size: 20});
        });
    </script>
</body>
</html>
