<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 丁惠!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Floating hearts */
        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            font-size: 30px;
            animation: float 4s ease-in-out infinite;
            opacity: 0.7;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(10deg); }
        }
        
        /* Main content */
        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        /* Card */
        .card {
            background: white;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 60px;
            color: #e91e63;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .name {
            font-size: 80px;
            color: #e91e63;
            font-weight: bold;
            margin: 30px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.15);
        }
        
        .cake {
            font-size: 120px;
            margin: 20px 0;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .message {
            font-size: 24px;
            color: #666;
            line-height: 1.8;
            margin: 30px 0;
        }
        
        .from {
            font-size: 28px;
            color: #e91e63;
            margin-top: 40px;
            font-weight: bold;
        }
        
        /* Photo gallery */
        .photos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .photo-frame {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .photo-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }
        
        .photo-label {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        
        /* Balloons */
        .balloons {
            font-size: 80px;
            margin: 20px 0;
        }
        
        /* Footer */
        footer {
            margin-top: 40px;
            color: #666;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <!-- Floating hearts -->
    <div class="hearts">
        <div class="heart" style="left: 10%; animation-delay: 0s;">❤️</div>
        <div class="heart" style="left: 20%; animation-delay: 1s;">💕</div>
        <div class="heart" style="left: 30%; animation-delay: 2s;">💖</div>
        <div class="heart" style="left: 40%; animation-delay: 0.5s;">💗</div>
        <div class="heart" style="left: 50%; animation-delay: 1.5s;">❤️</div>
        <div class="heart" style="left: 60%; animation-delay: 2.5s;">💕</div>
        <div class="heart" style="left: 70%; animation-delay: 0.8s;">💖</div>
        <div class="heart" style="left: 80%; animation-delay: 1.8s;">💗</div>
        <div class="heart" style="left: 90%; animation-delay: 0.3s;">❤️</div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="cake">🎂</div>
            <h1>Happy Birthday!</h1>
            <div class="name">丁惠</div>
            <p class="message">
                祝您生日快乐！<br>
                愿您每天都开心快乐！<br>
                愿您心想事成！<br>
                愿您健康幸福！
            </p>
            <div class="balloons">🎈🎉🎈</div>
        </div>
        
        <!-- Photo Section -->
        <div class="card">
            <h2>📸 美好回忆</h2>
            <div class="photos">
                <div class="photo-frame">
                    <div class="photo-placeholder">📷</div>
                    <div class="photo-label">添加照片</div>
                </div>
                <div class="photo-frame">
                    <div class="photo-placeholder">📷</div>
                    <div class="photo-label">添加照片</div>
                </div>
                <div class="photo-frame">
                    <div class="photo-placeholder">📷</div>
                    <div class="photo-label">添加照片</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <p class="message">
                感谢您一直以来的爱和付出！<br>
                您是最棒的妈妈！
            </p>
            <p class="from">—— 爱您的 Chris</p>
        </div>
        
        <footer>
            <p>🎉 Made with ❤️ for Mom 🎉</p>
        </footer>
    </div>
</body>
</html>
