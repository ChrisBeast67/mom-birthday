<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 丁惠!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9966 0%, #ff5e62 30%, #f9d423 70%, #56ab2f 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .emoji-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        
        .floating {
            position: absolute;
            font-size: 35px;
            animation: fall linear infinite;
            opacity: 0.8;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
        
        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
        }
        
        .card {
            background: white;
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 25px;
        }
        
        h1 {
            font-size: 45px;
            color: #ff6b35;
            margin-bottom: 15px;
        }
        
        .name {
            font-size: 65px;
            color: #ff6b35;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .cake {
            font-size: 90px;
            margin: 10px 0;
            animation: bounce 1.5s infinite;
            cursor: pointer;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        
        .message {
            font-size: 20px;
            color: #2d5a27;
            line-height: 1.6;
            margin: 15px 0;
        }
        
        .from {
            font-size: 24px;
            color: #ff6b35;
            margin-top: 25px;
            font-weight: bold;
        }
        
        .balloons {
            font-size: 50px;
            margin: 10px 0;
        }
        
        /* Game Section */
        .game-section {
            background: linear-gradient(135deg, #56ab2f, #a8e063);
            border-radius: 25px;
            padding: 30px;
            margin: 20px 0;
            color: white;
        }
        
        .game-section h2 {
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .game-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 20px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 40px;
            transition: transform 0.3s;
        }
        
        .game-btn:hover {
            transform: scale(1.1);
        }
        
        .game-btn p {
            font-size: 14px;
            margin-top: 8px;
            color: #333;
        }
        
        /* Game Frames */
        .game-frame {
            display: none;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .game-frame.active {
            display: block;
        }
        
        .game-frame canvas {
            border-radius: 10px;
            max-width: 100%;
            background: #0f0f23;
        }
        
        .close-btn {
            background: #e91e63;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
        }
        
        .score-display {
            font-size: 24px;
            color: white;
            margin: 10px 0;
        }
        
        /* Wish button */
        .wish-btn {
            background: linear-gradient(135deg, #ff6b35, #f9d423);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            margin: 15px;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        }
        
        .wishes {
            display: none;
            margin-top: 15px;
        }
        
        .wishes.show {
            display: block;
            animation: popIn 0.5s;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .wish {
            font-size: 18px;
            color: #ff6b35;
            margin: 8px 0;
            padding: 8px;
            background: #fff9e6;
            border-radius: 10px;
        }
        
        footer {
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- YouTube Player (hidden) -->
    <!-- YouTube Player (hidden) -->
    <div id="player" style="display:none;"></div>
    
    <!-- Music Control Button -->
    <button id="musicBtn" style="position:fixed;top:20px;right:20px;z-index:1000;background:#ff6b35;border:none;border-radius:50%;width:50px;height:50px;font-size:24px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.3);">🎵</button>
    
    <!-- Hidden YouTube Player -->
    <div id="player" style="position:fixed;top:-1000px;left:-1000px;"></div>
    
    <script>
        var player;
        document.getElementById('musicBtn').addEventListener('click', function() {
            if(!player) {
                player = new YT.Player('player', {
                    videoId: 'i0pzBmuK4jI',
                    playerVars: {'autoplay': 1, 'loop': 1, 'playlist': 'i0pzBmuK4jI'},
                    events: {'onReady': function(e) { e.target.setVolume(50); }}
                });
                this.innerHTML = '🔊';
            } else {
                player.playVideo();
                this.innerHTML = '🔊';
            }
        });
        
        // Load YouTube API
        var tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    </script>
    <!-- Floating emojis -->
    <div class="emoji-bg" id="emojiBg"></div>
    
    <div class="container">
        <!-- Main card -->
        <div class="card">
            <h1>🎉 Happy Birthday! 🎉</h1>
            <div class="name">丁惠</div>
            <div class="cake" onclick="blowCandle()">🎂</div>
            <p class="message">
                祝您生日快乐！<br>
                愿您每天都开心快乐！心想事成！健康幸福！
            </p>
            <button class="wish-btn" onclick="showWishes()">🎁 点击许愿</button>
            <div class="wishes" id="wishes">
                <div class="wish">💖 愿您永远年轻！</div>
                <div class="wish">💰 愿您财源滚滚！</div>
                <div class="wish">🏥 愿您身体健康！</div>
                <div class="wish">🎉 愿您天天开心！</div>
            </div>
            <div class="balloons">🎈🎉🎈</div>
        </div>
        
        <!-- Photo Gallery -->
        <div class="card" style="padding:25px;">
            <h2 style="color:#ff6b35;margin-bottom:20px;font-size:32px;">📸 美好时光</h2>
            <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:15px;max-width:700px;margin:0 auto;">
                <img src="images/family1.jpg" style="width:200px;height:150px;object-fit:cover;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);transition:transform 0.3s;cursor:pointer;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="images/family2.jpg" style="width:200px;height:150px;object-fit:cover;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);transition:transform 0.3s;cursor:pointer;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="images/family3.jpg" style="width:200px;height:150px;object-fit:cover;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);transition:transform 0.3s;cursor:pointer;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="images/family4.jpg" style="width:200px;height:150px;object-fit:cover;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);transition:transform 0.3s;cursor:pointer;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="images/family5.jpg" style="width:200px;height:150px;object-fit:cover;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);transition:transform 0.3s;cursor:pointer;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <img src="images/family6.jpg" style="width:200px;height:150px;object-fit:cover;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);transition:transform 0.3s;cursor:pointer;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            </div>
        </div>
        
        <!-- Games Section -->
        <div class="game-section">
            <h2>🎮 玩游戏吧!</h2>
            <div class="games-grid">
                <button class="game-btn" onclick="openGame('snake')">
                    🐍
                    <p>贪吃蛇</p>
                </button>
                <button class="game-btn" onclick="openGame('pong')">
                    🏓
                    <p>乒乓球</p>
                </button>
                <button class="game-btn" onclick="openGame('breakout')">
                    🧱
                    <p>打砖块</p>
                </button>
                <button class="game-btn" onclick="openGame('racing')">
                    🏎️
                    <p>赛车</p>
                </button>
            </div>
            
            <!-- Snake Game -->
            <div class="game-frame" id="snakeGame">
                <h3>🐍 贪吃蛇</h3>
                <p>用方向键控制!</p>
                <canvas id="snakeCanvas" width="350" height="350"></canvas>
                <p class="score-display">分数: <span id="snakeScore">0</span></p>
                <button class="close-btn" onclick="closeGame('snake')">结束游戏</button>
            </div>
            
            <!-- Pong Game -->
            <div class="game-frame" id="pongGame">
                <h3>🏓 乒乓球</h3>
                <p>W/S 控制上方, 方向键控制下方</p>
                <canvas id="pongCanvas" width="350" height="250"></canvas>
                <p class="score-display">分数: <span id="pongScore1">0</span> - <span id="pongScore2">0</span></p>
                <button class="close-btn" onclick="closeGame('pong')">结束游戏</button>
            </div>
            
            <!-- Breakout Game -->
            <div class="game-frame" id="breakoutGame">
                <h3>🧱 打砖块</h3>
                <p>鼠标控制挡板!</p>
                <canvas id="breakoutCanvas" width="350" height="300"></canvas>
                <p class="score-display">分数: <span id="breakoutScore">0</span></p>
                <button class="close-btn" onclick="closeGame('breakout')">结束游戏</button>
            </div>
            
            <!-- Racing Game -->
            <div class="game-frame" id="racingGame">
                <h3>🏎️ 赛车</h3>
                <p>鼠标控制左右!</p>
                <canvas id="racingCanvas" width="300" height="400"></canvas>
                <p class="score-display">分数: <span id="racingScore">0</span></p>
                <button class="close-btn" onclick="closeGame('racing')">结束游戏</button>
            </div>
        </div>
        
        <!-- Message -->
        <div class="card">
            <p class="message">
                感谢您一直以来的爱和付出！<br>
                您是最棒的妈妈！
            </p>
            <p class="from">—— 爱您的 Chris ❤️</p>
        </div>
        
        <footer>
            <p>🎉 Made with ❤️ for Mom 🎉</p>
        </footer>
    </div>
    
    <script>
        // Floating emojis
        const emojis = ['❤️', '💕', '💖', '💗', '🎉', '🎈', '🌟', '⭐'];
        const emojiBg = document.getElementById('emojiBg');
        
        for(let i = 0; i < 25; i++) {
            const emoji = document.createElement('div');
            emoji.className = 'floating';
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + '%';
            emoji.style.animationDuration = (Math.random() * 3 + 4) + 's';
            emoji.style.animationDelay = Math.random() * 5 + 's';
            emojiBg.appendChild(emoji);
        }
        
        // Wishes
        function showWishes() {
            document.getElementById('wishes').classList.toggle('show');
        }
        
        function blowCandle() {
            alert('🎉 许个愿吧！🎉');
        }
        
        // Game System
        let activeGames = {};
        
        function openGame(game) {
            document.querySelectorAll('.game-frame').forEach(g => g.classList.remove('active'));
            document.getElementById(game + 'Game').classList.add('active');
            
            if(game === 'snake' && !activeGames.snake) startSnake();
            if(game === 'pong' && !activeGames.pong) startPong();
            if(game === 'breakout' && !activeGames.breakout) startBreakout();
            if(game === 'racing' && !activeGames.racing) startRacing();
        }
        
        function closeGame(game) {
            document.getElementById(game + 'Game').classList.remove('active');
            activeGames[game] = false;
        }
        
        // Snake Game
        let snakeRunning = false;
        function startSnake() {
            snakeRunning = true;
            activeGames.snake = true;
            const canvas = document.getElementById('snakeCanvas');
            const ctx = canvas.getContext('2d');
            let snake = [{x:175,y:175},{x:160,y:175},{x:145,y:175}];
            let appleX = 100, appleY = 100;
            let dx = 15, dy = 0;
            let score = 0;
            
            document.onkeydown = e => {
                if(e.keyCode==37 && dx==0) {dx=-15;dy=0;}
                if(e.keyCode==39 && dx==0) {dx=15;dy=0;}
                if(e.keyCode==38 && dy==0) {dx=0;dy=-15;}
                if(e.keyCode==40 && dy==0) {dx=0;dy=15;}
            }
            
            function draw() {
                if(!snakeRunning) return;
                
                ctx.fillStyle = '#0f0f23';
                ctx.fillRect(0,0,350,350);
                
                // Apple
                ctx.fillStyle = 'red';
                ctx.fillRect(appleX,appleY,13,13);
                
                // Snake
                ctx.fillStyle = '#00ff00';
                snake.forEach(s => ctx.fillRect(s.x,s.y,13,13));
                
                let head = {x:snake[0].x+dx,y:snake[0].y+dy};
                if(head.x<0) head.x=335; if(head.x>335) head.x=0;
                if(head.y<0) head.y=335; if(head.y>335) head.y=0;
                
                if(snake.some(s=>s.x==head.x && s.y==head.y)) {
                    score=0; snake=[{x:175,y:175},{x:160,y:175},{x:145,y:175}]; dx=15;dy=0;
                }
                
                if(head.x==appleX && head.y==appleY) {
                    score+=10; document.getElementById('snakeScore').innerText=score;
                    appleX=Math.floor(Math.random()*22)*15; appleY=Math.floor(Math.random()*22)*15;
                } else snake.pop();
                
                snake.unshift(head);
                setTimeout(draw, 150);
            }
            draw();
        }
        
        // Pong Game
        let pongRunning = false;
        function startPong() {
            pongRunning = true;
            activeGames.pong = true;
            const canvas = document.getElementById('pongCanvas');
            const ctx = canvas.getContext('2d');
            let p1=0, p2=0, py1=100, py2=100, by=125, bx=175, bvx=4, bvy=3;
            
            document.onkeydown = e => {
                if(e.key==='w' && py1>0) py1-=15;
                if(e.key==='s' && py1<210) py1+=15;
                if(e.keyCode==38 && py2>0) py2-=15;
                if(e.keyCode==40 && py2<210) py2+=15;
            }
            
            function draw() {
                if(!pongRunning) return;
                
                ctx.fillStyle='#0f0f23';
                ctx.fillRect(0,0,350,250);
                
                ctx.fillStyle='#fff';
                ctx.fillRect(10,py1,8,40); ctx.fillRect(332,py2,8,40);
                ctx.beginPath(); ctx.arc(bx,by,8,0,Math.PI*2); ctx.fill();
                
                bx+=bvx; by+=bvy;
                if(by<0||by>242) bvy=-bvy;
                if(bx<18 && by>py1 && by<py1+40) bvx=Math.abs(bvx);
                if(bx>332 && by>py2 && by<py2+40) bvx=-Math.abs(bvx);
                if(bx<0) {p2++; document.getElementById('pongScore2').innerText=p2; bx=175;by=125;bvx=4;}
                if(bx>350) {p1++; document.getElementById('pongScore1').innerText=p1; bx=175;by=125;bvx=-4;}
                
                requestAnimationFrame(draw);
            }
            draw();
        }
        
        // Breakout Game
        let breakoutRunning = false;
        function startBreakout() {
            breakoutRunning = true;
            activeGames.breakout = true;
            const canvas = document.getElementById('breakoutCanvas');
            const ctx = canvas.getContext('2d');
            let px=140, py=280, bx=175, by=200, bvx=4, bvy=-4, score=0;
            let bricks=[];
            for(let r=0;r<4;r++) for(let c=0;c<7;c++) bricks.push({x:c*48+10,y:r*20+30,w:44,h:16});
            
            canvas.onmousemove = e => {
                let r=canvas.getBoundingClientRect();
                px=e.clientX-r.left-40;
            }
            
            function draw() {
                if(!breakoutRunning) return;
                
                ctx.fillStyle='#0f0f23';
                ctx.fillRect(0,0,350,300);
                
                ctx.fillStyle='#e91e63';
                bricks.forEach(b => {if(b.active!==false) ctx.fillRect(b.x,b.y,b.w,b.h)});
                
                ctx.fillStyle='#fff';
                ctx.fillRect(px,py,80,10); ctx.beginPath(); ctx.arc(bx,by,8,0,Math.PI*2); ctx.fill();
                
                bx+=bvx; by+=bvy;
                if(by<0) bvy=-bvy;
                if(bx<0||bx>350) bvx=-bvx;
                if(by>py-10 && bx>px && bx<px+80) bvy=-Math.abs(bvy);
                
                bricks.forEach(b => {
                    if(b.active!==false && bx>b.x && bx<b.x+b.w && by>b.y && by<b.y+b.h) {
                        b.active=false; bvy=-bvy; score+=10;
                        document.getElementById('breakoutScore').innerText=score;
                    }
                });
                
                if(by>300) {score=0; bx=175;by=200; document.getElementById('breakoutScore').innerText=0;}
                
                requestAnimationFrame(draw);
            }
            draw();
        }
        
        // Racing Game
        let racingRunning = false;
        function startRacing() {
            racingRunning = true;
            activeGames.racing = true;
            const canvas = document.getElementById('racingCanvas');
            const ctx = canvas.getContext('2d');
            let carX=130, score=0, speed=5, enemies=[];
            
            canvas.onmousemove = e => {
                let r=canvas.getBoundingClientRect();
                carX=e.clientX-r.left-20;
                if(carX<30) carX=30; if(carX>250) carX=250;
            }
            
            function draw() {
                if(!racingRunning) return;
                
                ctx.fillStyle='#333';
                ctx.fillRect(0,0,300,400);
                ctx.fillStyle='#27ae60';
                ctx.fillRect(0,0,25,400); ctx.fillRect(275,0,25,400);
                
                ctx.fillStyle='red';
                enemies.forEach(e => ctx.fillRect(e.x,e.y,30,50));
                
                ctx.fillStyle='blue';
                ctx.fillRect(carX,340,40,60);
                
                if(Math.random()<0.03) enemies.push({x:30+Math.random()*215,y:-50});
                enemies.forEach((e,i) => {
                    e.y+=speed;
                    if(e.y>400) {enemies.splice(i,1); score+=10; document.getElementById('racingScore').innerText=score;}
                    if(carX<e.x+30 && carX+40>e.x && e.y+50>340 && e.y<400) {
                        alert('游戏结束! 分数: '+score);
                        enemies=[]; score=0; document.getElementById('racingScore').innerText=0;
                    }
                });
                
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
